name: MSVC-CI
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:
jobs:
  check_version:
    runs-on: windows-2022
    strategy:
      matrix:
        toolset_ver:
          - "v141"
          - "v142"
          - 141
          - 142
          - 14.1
          - 14.16
          - 14.2 # 等同于14.29
          - 14.29
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查MSVC版本脚本是否存在
        run: |
          if (Test-Path ./.ci/msvc_version.ps1) {
              Write-Host "脚本存在: $(Resolve-Path ./.ci/msvc_version.ps1)"
          } else {
              Write-Host "错误: 脚本不存在!"
              exit 1
          }
        shell: pwsh

      - name: 安装VS2017 Build Tools (v141)
        run: |
          $scriptPath = Resolve-Path -Path ./.ci/msvc_version.ps1
          Write-Host "使用脚本路径: $scriptPath"
          & $scriptPath
        shell: pwsh

      - run: |
          "CL_VERSION=$(cl /? 2>&1 | Select-String -Pattern 'Compiler Version' -CaseSensitive -SimpleMatch)" | Out-File -Append -FilePath ${env:GITHUB_OUTPUT}
        shell: pwsh
        id: cl

      - run: echo "::warning ::Windows + toolset-${{ matrix.toolset_ver }} = ${{ steps.cl.outputs.CL_VERSION }}"