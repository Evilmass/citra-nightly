name: MSVC-CI
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:
jobs:
  check_version:
    runs-on: windows-2022
    strategy:
      matrix:
        toolset_ver:
          - "v141"
          - "v142"
          - 14.1
          - 14.16
          - 14.2 # 等同于14.29
          - 14.29
    steps:
      - uses: actions/checkout@v4

      - name: custom install msvc v141
        run: ./.ci/msvc_version.ps1
        shell: pwsh

      - name: check toolset version
      - run: "CL_VERSION=$(cl /? 2>&1 | Select-String -Pattern 'Compiler Version' -CaseSensitive -SimpleMatch)" Out-File -Append -FilePath ${env:GITHUB_OUTPUT}
        shell: pwsh
        id: cl

      - name: echo toolset version
      - run: echo "::warning ::Windows + toolset-${{ matrix.toolset_ver }} = ${{ steps.cl.outputs.CL_VERSION }}"