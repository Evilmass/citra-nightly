name: MSVC-CI
on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]
  workflow_dispatch:
jobs:
  check_version:
    runs-on: windows-2022
    strategy:
      matrix:
        toolset_ver:
          - "v141"
          - "v142"
          - 14.1
          - 14.16
          - 14.2 # 等同于14.29
          - 14.29
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 自定义安装 MSVC v141
        run: |
          # 下载 VS Build Tools 安装器
          Invoke-WebRequest -Uri "https://aka.ms/vs/15/release/vs_BuildTools.exe" -OutFile "vs_buildtools.exe"
          # 安装 v141 工具集（VS2017 生成工具）
          ./vs_buildtools.exe --wait --norestart --nocache ` |
              --add Microsoft.VisualStudio.Workload.MSBuildTools ` |
              --add Microsoft.VisualStudio.Workload.VCTools ` |
              --add Microsoft.VisualStudio.Component.TestTools.BuildTools ` |
              --add Microsoft.VisualStudio.Component.VC.CMake.Project ` |
              --add Microsoft.VisualStudio.Component.Windows10SDK.19041 ` |
              --add Microsoft.VisualStudio.Component.VC.v141.x86.x64 ` |
              --add Microsoft.VisualStudio.VC.MSBuild.v150.x64.v141 ` |
              --remove Microsoft.VisualStudio.Component.Windows10SDK.10240 ` |
              --remove Microsoft.VisualStudio.Component.Windows10SDK.10586 ` |
              --remove Microsoft.VisualStudio.Component.Windows10SDK.14393 ` |
              --remove Microsoft.VisualStudio.Component.Windows10SDK.16299 ` |
              --remove Microsoft.VisualStudio.Component.Windows10SDK.17134 ` |
              --remove Microsoft.VisualStudio.Component.Windows10SDK.17763 ` |
              --remove Microsoft.VisualStudio.Component.Windows81SDK
        shell: pwsh
      
      - name: abspath
        run: C:\BuildTools\VC\Tools\MSVC\14.16.27023\bin\HostX86\x86\cl.exe

      - name: 检查工具集版本
        run: |
          $compilerInfo = 'C:\BuildTools\VC\Tools\MSVC\14.16.27023\bin\HostX86\x86\cl.exe' /? 2>&1 | Select-String -Pattern 'Compiler Version' -CaseSensitive
          "$($compilerInfo.Line)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        shell: pwsh
        id: cl
      
      - name: 输出工具集版本
        run: echo "::warning ::Windows + toolset-${{ matrix.toolset_ver }} = ${{ steps.cl.outputs.CL_VERSION }}"

      # - uses: ilammy/msvc-dev-cmd@v1
      #   with:
      #     arch: x64
      #     toolset: ${{ matrix.toolset_ver }}
      # # https://learn.microsoft.com/cpp/build/reference/help-compiler-command-line-help
