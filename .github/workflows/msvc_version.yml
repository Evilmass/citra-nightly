# workload 安装全部 required，component 单独组件
# https://learn.microsoft.com/en-us/visualstudio/install/workload-component-id-vs-build-tools?view=vs-2022#desktop-development-with-c

name: MSVC-CI
on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]
  workflow_dispatch:
jobs:
  check_version:
    runs-on: windows-2022
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 MSVC 2017
        shell: pwsh
        run: |
          # workload 安装全部 required，component 单独组件
          # https://learn.microsoft.com/en-us/visualstudio/install/workload-component-id-vs-build-tools?view=vs-2022#desktop-development-with-c

          Write-Host "Installing MSVC v141"

          $vs_url = "https://aka.ms/vs/15/release/vs_BuildTools.exe"
          $components = @(
            "Microsoft.VisualStudio.Workload.VCTools",
            "Microsoft.VisualStudio.Component.Windows10SDK.19041",
            "Microsoft.VisualStudio.Component.VC.v141.x86.x64",
            "Microsoft.VisualStudio.Component.VC.CMake.Project"
          )

          # 下载安装器
          Invoke-WebRequest -Uri $vs_url -OutFile "vs_buildtools.exe"
          if (-not (Test-Path "vs_buildtools.exe")) {
              Write-Error "Failed to download VS Build Tools"
              exit 1
          }

          # 构造安装命令（修正后的语法）
          $componentArgs = ($components | ForEach-Object { "--add $_" }) -join " "
          $installCmd = ".\vs_buildtools.exe --quiet --norestart --force --wait --installPath C:\BuildTools $componentArgs"

          Write-Host "Running: $installCmd"
          Start-Process -FilePath ".\vs_buildtools.exe" -ArgumentList $installCmd.Split() -Wait -PassThru

      - name: 验证各个组件
        shell: cmd
        run: |
          Write-Host "Checking vcvarsall"
          call "C:\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64

          Write-Host "Checking cl"
          cl /?

          Write-Host "Checking cmake"
          cmake /?

          Write-Host "Checking msbuild"
          msbuild /?

      - name: Install extra tools (MSVC)
        run: choco install ccache ninja ptime wget

      - name: Install vulkan-sdk (MSVC)
        run: |
          wget https://sdk.lunarg.com/sdk/download/1.4.304.1/windows/VulkanSDK-1.4.304.1-Installer.exe -O D:/a/_temp/vulkan.exe
          D:/a/_temp/vulkan.exe --accept-licenses --default-answer --confirm-command install

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: ${{ matrix.toolset_ver }}
      - run: |
          "CL_VERSION=$(cl /? 2>&1 | Select-String -Pattern 'Compiler Version' -CaseSensitive -SimpleMatch)" | Out-File -Append -FilePath ${env:\GITHUB_OUTPUT}
        shell: pwsh
        id: cl
      - run: echo '::warning ::${{ matrix.os }} + toolset-${{ matrix.toolset_ver }} = ${{ steps.cl.outputs.CL_VERSION }}'

